  /ente/{codiceEnte}/multipartBatch:
    post:
      tags:
        - Batch
      description: InserimentoMultipartBatch
      operationId: InserimentoMultipartBatch
      summary: Inserimento di una nuova operazione batch
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - idBatch
                - entita
                - azione
              properties:
                idBatch:
                  type: string
                  description: identificativo dell'esecuzione batch, univoco per ente
                entita:
                  type: string
                  enum:
                    - PAGAMENTO
                azione:
                  type: string
                  enum:
                    - INSERIMENTO
                    - MODIFICA
                    - ELIMINAZIONE
                    - VARIAZIONESTATO
                urlNotifica:
                  type: string
                  format: url
                  description: url sul quale è possibile ricevere la notifica di completamento dell'operazione batch. Consiste in una chiamata POST con body coerente allo schema di `BatchStato`
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Inserimento di un'operazione schedulata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InserimentoBatch'
        '400':
          description: Richiesta non valida
