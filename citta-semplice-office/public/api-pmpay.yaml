openapi: 3.0.0
info:
  version: v1
  title: API PmPay - PagoPA
  description: Rest API per PmPay PagoPA
servers:
  - url: https://service.pmpay.it/pagoparest
    description: ambiente di test/preproduzione
  - url: https://secure.pmpay.it/pagoparest
    description: ambiente di produzione
tags:
  - name: Autenticazione
  - name: Ente
    description: gestione di un singolo ente
  - name: Conto
    description: operazioni sui conti associati ad un ente
  - name: Servizio
    description: prestazioni offerte da un ente
  - name: Anagrafica
    description: informazioni relative ai soggetti che operano con un ente
  - name: Pagamento
    description: gestione dei pagamenti verso un ente
  - name: Rendicontazione
  - name: Batch
    description: gestione delle operazioni massive su un'entità
  - name: IUV
    description: utility per il rilascio di un'id univoco per l'ente utilizzabile come IUV
  - name: Accertamento
    description: operazioni legate ad accertamenti

paths:
  /autenticazione:
    post:
      tags: [ Autenticazione ]
      summary: Richiesta nuovo token
      responses:
        200:
          description: Autenticazione avvenuta con successo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credenziali'
  /ente/{codiceEnte}:
    get:
      tags: [ Ente ]
      operationId: getEnte
      summary: Richiedi le informazione di un ente
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      responses:
        200:
          description: I dati dell'ente corrispondente al codice richiesto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ente'
  /ente/{codiceEnte}/conto:
    post:
      tags: [ Conto ]
      description: ContoCreate
      operationId: createConto
      summary: Inserimento di un nuovo conto
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InserimentoConto'
      responses:
        201:
          description: Conto creato correttamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatoConId'
    get:
      tags: [ Conto ]
      description: ContoByEnte
      operationId: listContoByEnte
      summary: Lista dei conti legati ad un ente
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      responses:
        200:
          description: Lista conti
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conto'
  /ente/{codiceEnte}/conto/{idConto}:
    put:
      tags: [ Conto ]
      description: ContoUpdate
      operationId: updateConto
      summary: Modifica di un conto esistente
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: idConto
          in: path
          required: true
          description: Identificativo del conto
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificaConto'
      responses:
        200:
          description: Modifica avvenuta correttamente
    get:
      tags: [ Conto ]
      description: ContoByIdConto
      operationId: findContoByIdConto
      summary: Dettaglio di un conto
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: idConto
          in: path
          required: true
          description: Identificativo del conto
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Dettaglio conto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conto'
  /ente/{codiceEnte}/servizio:
    post:
      tags: [ Servizio ]
      description: ServizioCreate
      operationId: createServizio
      summary: Inserimento di un nuovo servizio
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      requestBody:
        $ref: '#/components/requestBodies/InserimentoServizioRequest'
      responses:
        201:
          description: Servizio creato correttamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Creato'
    get:
      tags: [ Servizio ]
      description: ServizioByEnte
      operationId: findServiziByEnte
      summary: Lista dei servizi legati ad un ente
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      responses:
        200:
          description: Lista servizi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Servizio'
  /ente/{codiceEnte}/servizio/{codiceServizio}:
    put:
      tags: [ Servizio ]
      description: ServizioUpdate
      operationId: updateServizio
      summary: Modifica di un servizio esistente
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: codiceServizio
          in: path
          required: true
          description: Codice del servizio
          schema:
            type: string
      requestBody:
        $ref: '#/components/requestBodies/ModificaServizioRequest'
      responses:
        200:
          description: Modifica avvenuta correttamente
    get:
      tags: [ Servizio ]
      description: ServizioByCodiceServizio
      operationId: findServizioByCodiceServizio
      summary: Dettaglio di un servizio
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: codiceServizio
          in: path
          required: true
          description: Codice del servizio
          schema:
            type: string
      responses:
        200:
          description: Dettaglio servizio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Servizio'
  /ente/{codiceEnte}/pagamento:
    post:
      tags: [ Pagamento ]
      operationId: insertPagamento
      description: |
        Inserimento singolo pagamento.
        
        Se non viene popolato il campo `iuv` questi verrà generato automaticamente e restituito in output.
      summary: Inserimento di un nuovo pagamento
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pagamento'
      responses:
        '201':
          description: pagamento creato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Creato'
        '400':
          description: errore nella richiesta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ente/{codiceEnte}/pagamento/{identificativoPagamento}:
    get:
      tags: [ Pagamento ]
      operationId: getPagamento
      description: Dettaglio di un pagamento
      summary: Dettaglio di un pagamento
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Dettaglio pagamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pagamento'
    put:
      tags: [ Pagamento ]
      operationId: updatePagamento
      description: Modifica di un pagamento
      summary: Modifica di un pagamento
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificaPagamento'
      responses:
        '200':
          description: Modifica avvenuta correttamente
    delete:
      tags: [ Pagamento ]
      operationId: deletePagamento
      description: "Eliminazione di un pagamento"
      summary: "Eliminazione di un pagamento"
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Eliminazione avvenuta correttamente

  /ente/{codiceEnte}/pagamento/{identificativoPagamento}/accertamenti:
    put:
      tags: [ ModificaPagamentoAccertamenti ]
      operationId: updateAccertamentiPagamento
      description: Modifica accertamenti di un pagamento
      summary: Modifica accertamenti di un pagamento
      security:
        - bearerToken: [ ]
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModificaPagamentoAccertamenti'
      responses:
        '200':
          description: Modifica avvenuta correttamente

  /ente/{codiceEnte}/pagamento/ricerca:
    post:
      tags: [ Pagamento ]
      operationId: ricercaPagamento
      description: Ricerca di pagamenti
      summary: Ricerca di pagamenti
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RicercaPagamento'
      responses:
        '200':
          description: elenco pagamenti
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RicercaPagamentoRisposta'
        '400':
          description: errore nella richiesta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ente/{codiceEnte}/pagamento/{iuv}/bollettino:
    get:
      tags: [ Pagamento ]
      operationId: getBollettinoPagamento
      description: Ottieni il bollettino di un pagamento
      summary: Ottieni bollettino
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: iuv
          in: path
          required: true
          description: Identificativo del pagamento
          schema:
            type: string
      responses:
        '200':
          description: Pdf bollettino pagamento
          content:
            application/pdf:
              schema:
                type: string
                format: binary
  /ente/{codiceEnte}/pagamento/{iuv}/ricevutatelematica:
    get:
      tags: [ Pagamento ]
      operationId: getRicevutaTelematicaPagamento
      description: Ottieni la ricevuta telematica di un pagamento
      summary: Ottieni RT
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: iuv
          in: path
          required: true
          description: Identificativo del pagamento
          schema:
            type: string
      responses:
        '200':
          description: Ricevuta telematica pagamento
          content:
            text/xml:
              schema:
                type: string
                format: binary
  /ente/{codiceEnte}/pagamento/{iuv}/ricevutatelematicazip:
    get:
      tags: [ Pagamento ]
      operationId: getRicevutaTelematicaPagamentoZip
      description: Ottieni un archivio contenente le ricevute telematiche relative allo iuv specificato (modello 1 multi beneficiario può dare luogo a due RT)
      summary: Ottieni RT
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: iuv
          in: path
          required: true
          description: Identificativo del pagamento
          schema:
            type: string
      responses:
        '200':
          description: Ricevuta telematica pagamento
          content:
            application/zip:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
  /ente/{codiceEnte}/pagamento/{iuv}/urlpagamento:
    post:
      tags: [ Pagamento ]
      operationId: getUrlPagamento
      description: Ottieni l'url all'indirizzo dove è possibile completare il pagamento
      summary: Ottieni url pagamento
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: iuv
          in: path
          required: true
          description: Identificativo del pagamento
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UrlPagamentoRichiesta'
      responses:
        '200':
          description: Risposta con l'url per il pagamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UrlPagamentoRisposta'
  /ente/{codiceEnte}/pagamento/urlpagamentoCarrello:
    post:
      tags: [ Pagamento ]
      operationId: getUrlPagamentoCarrello
      description: Ottieni l'url all'indirizzo dove è possibile completare il pagamento di un carrello
      summary: Ottieni url pagamento
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UrlPagamentoCarrelloRichiesta'
      responses:
        '200':
          description: Risposta con l'url per il pagamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UrlPagamentoRisposta'
  /ente/{codiceEnte}/pagamento/{identificativoPagamento}/stato-confermato:
    post:
      tags: [ Pagamento ]
      operationId: setPagamentoConfermato
      description: Aggiorna lo stato di un pagamento pagato fuori nodo a `CON`
      summary: Aggiorna stato Pagamento CON
      security:
        - bearerToken: [ ]
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      responses:
        '204':
          description: Aggiornamento stato avvenuto con successo
        '400':
          description: Non è possibile modificare lo stato del pagamento
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /ente/{codiceEnte}/receipt/{identificativoPagamento}:
    get:
      tags: [Pagamento]
      operationId: getReceipt
      summary: Ottieni la ricevuta (receipt) di un pagamento
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      responses:
        200:
          description: Dettaglio receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
  /ente/{codiceEnte}/receipt/{partitaIva}/{identificativoPagamento}:
    get:
      tags: [Pagamento]
      operationId: getReceiptEnteTerzo
      summary: Ottieni la ricevuta (receipt) di un pagamento relativo ad un altro ente
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: partitaIva
          in: path
          required: true
          description: Partita iva relativa all'ente owner del pagamento
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      responses:
        200:
          description: Dettaglio receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
  /ente/{codiceEnte}/receipt-pdf/{identificativoPagamento}:
    get:
      tags: [ Pagamento ]
      operationId: getReceiptPdf
      summary: Ottieni la ricevuta (receipt) di un pagamento in formato pdf
      security:
        - bearerToken: [ ]
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      responses:
        200:
          description: Dettaglio receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
  /ente/{codiceEnte}/receipt-pdf/{partitaIva}/{identificativoPagamento}:
    get:
      tags: [ Pagamento ]
      operationId: getReceiptPdfEnteTerzo
      summary: Ottieni la ricevuta (receipt) in formato pdf di un pagamento relativo ad un altro ente
      security:
        - bearerToken: [ ]
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
        - name: partitaIva
          in: path
          required: true
          description: Partita iva relativa all'ente owner del pagamento
          schema:
            type: string
        - name: identificativoPagamento
          in: path
          required: true
          description: >-
            Identificativo del pagamento. Di default viene supportato lo IUV ma è possibile utilizzare l'idDebito aggiungendo il query parameter **idDebito** con valore true.
            `/ente/{codiceEnte}/pagamento/{identificativoPagamento}?idDebito=true`
          schema:
            type: string
        - name: idDebito
          in: query
          required: false
          description: Uso dell'idDebito come identificativo del pagamento
          schema:
            type: boolean
            default: false
      responses:
        200:
          description: Dettaglio receipt
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Receipt'
  /ente/{codiceEnte}/anagrafica:
    post:
      tags: [ Anagrafica ]
      description: AnagraficaCreate
      operationId: createAnagrafica
      summary: Inserimento di una nuova anagrafica
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Anagrafica'
      responses:
        201:
          description: Servizio creato correttamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatoConId'
    get:
      tags: [ Anagrafica ]
      description: AnagraficaByEnte
      operationId: findAnagraficaByEnte
      summary: Lista delle anagrafiche legate ad un ente
      security:
        - bearerToken: []
      parameters:
        - name: codiceEnte
          in: path
          required: true
          description: Codice dell'ente
          schema:
            type: string
      responses:
        200:
          description: Lista anagrafiche
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Anagrafica'
  /ente/{codiceEnte}/anagrafica/{idFiscale}:
    put:
      tags: [ Anagrafica ]
      description: AnagraficaUpdate
      operationId: updateAnagrafica
